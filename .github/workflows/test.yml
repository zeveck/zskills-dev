name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required by tests/test-update-zskills-migration.sh case 6c
          # (commit-cohabitation): the test uses `git log -1 -- <path>` and
          # `merge-base --is-ancestor`, both of which need full history.
          # With the default fetch-depth: 1 (shallow), case 6c's prior code
          # would silently call `pass "shallow clone — skipped"` and the
          # test was invisible in CI for ~24h while drift accumulated on
          # main (issue surfaced 2026-05-01). Phase B of recovery.
          fetch-depth: 0

      - name: Configure git for test setup
        run: |
          git config --global user.email "ci@zskills.test"
          git config --global user.name "CI Test Runner"
          git config --global init.defaultBranch main

      - name: Run full test suite
        run: bash tests/run-all.sh

      - name: Bash syntax check on hooks and scripts
        run: |
          for f in hooks/*.sh hooks/*.template scripts/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking: $f"
            bash -n "$f" || exit 1
          done

      - name: Verify installed skill copies match source
        run: |
          drift=0
          for src in skills/*/SKILL.md; do
            name=$(basename "$(dirname "$src")")
            installed=".claude/skills/$name/SKILL.md"
            if [ -f "$installed" ]; then
              if ! diff -q "$src" "$installed" >/dev/null; then
                echo "DRIFT: $installed differs from $src"
                drift=1
              fi
            fi
          done
          [ "$drift" -eq 0 ] || exit 1

      - name: Check for stdin bash-ism regression
        run: |
          # Regression: $(</dev/stdin) fails silently in the hook context.
          # Use $(cat) instead. See commit 33f987b for history.
          if grep -rn '\$(</dev/stdin)' hooks/ .claude/hooks/ 2>/dev/null; then
            echo "ERROR: \$(</dev/stdin) found — use \$(cat) instead"
            exit 1
          fi
          echo "No stdin bash-ism found"
